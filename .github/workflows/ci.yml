name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile check
        run: python -m compileall -q app.py core
      - name: Import check
        run: python -c "import app; from core import actions, codex, history, memory, patrol, perms, plans, search, sessions, skills, terminal, transcripts"
      - name: Tests
        run: python -m pytest -q
